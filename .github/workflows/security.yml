name: Security Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  security-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start stack for security testing
        run: |
          docker compose -f docker-compose.dev.yml up -d --build \
            boan-policy-server boan-credential-filter boan-onecli boan-proxy
        timeout-minutes: 5
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:18081/healthz && break
            sleep 2
          done
      - name: Run security tests
        run: bash test/security/run.sh
        env:
          BOAN_POLICY_URL: http://localhost:8081
          BOAN_CRED_URL: http://localhost:8082
          BOAN_ONECLI_URL: http://localhost:8083
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  static-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
      - name: Check no raw API keys in env configs
        run: |
          ! grep -r "ANTHROPIC_API_KEY\s*=" docker-compose.dev.yml || true
          ! grep -rE "sk-ant-|sk-proj-" docker-compose.dev.yml
      - name: Verify seccomp profile exists
        run: test -f src/packages/boan-sandbox/seccomp.json
      - name: Verify env sanitization in entrypoint
        run: |
          grep -q "SSLKEYLOGFILE" src/packages/boan-sandbox/entrypoint.sh
          grep -q "LD_PRELOAD" src/packages/boan-sandbox/entrypoint.sh
