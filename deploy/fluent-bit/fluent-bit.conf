[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# BoanClaw proxy 로그 수집
[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224
    Tag          boanclaw.*

# 컨테이너 로그 수집 (Docker)
[INPUT]
    Name         docker
    Tag          docker.*

# ── Wazuh manager alerts (JSON lines). ───────────────────────────────
# manager 가 agent 이벤트 룰 매칭 후 alert 마다 이 파일에 append.
[INPUT]
    Name              tail
    Path              /var/ossec/logs/alerts/alerts.json
    Tag               wazuh.alerts
    Parser            json
    Mem_Buf_Limit     16MB
    Refresh_Interval  2
    DB                /tmp/fluentbit_wazuh_alerts.db

# ── Wazuh archives (all raw events, high-volume — optional) ──────────
[INPUT]
    Name              tail
    Path              /var/ossec/logs/archives/archives.json
    Tag               wazuh.archives
    Parser            json
    Mem_Buf_Limit     32MB
    Refresh_Interval  5
    DB                /tmp/fluentbit_wazuh_archives.db

# 조직 식별자 + source 태그 부여.
[FILTER]
    Name    record_modifier
    Match   wazuh.*
    Record  source boanclaw-wazuh

# 구조화된 JSON 로그 파싱
[FILTER]
    Name         parser
    Match        boanclaw.*
    Key_Name     log
    Parser       json
    Reserve_Data On

# stdout 출력 (디버깅)
[OUTPUT]
    Name         stdout
    Match        *
    Format       json_lines

# 파일 출력 (로컬 로그 보관)
[OUTPUT]
    Name         file
    Match        boanclaw.*
    Path         /var/log/boanclaw/
    File         traces.log

