[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# BoanClaw proxy 로그 수집
[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224
    Tag          boanclaw.*

# 컨테이너 로그 수집 (Docker)
[INPUT]
    Name         docker
    Tag          docker.*

# 구조화된 JSON 로그 파싱
[FILTER]
    Name         parser
    Match        boanclaw.*
    Key_Name     log
    Parser       json
    Reserve_Data On

# stdout 출력 (디버깅)
[OUTPUT]
    Name         stdout
    Match        *
    Format       json_lines

# 파일 출력 (로컬 로그 보관)
[OUTPUT]
    Name         file
    Match        boanclaw.*
    Path         /var/log/boanclaw/
    File         traces.log

