[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# BoanClaw proxy 로그 수집
[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224
    Tag          boanclaw.*

# 컨테이너 로그 수집 (Docker)
[INPUT]
    Name         docker
    Tag          docker.*

# ── Wazuh manager alerts (JSON lines). ───────────────────────────────
# manager 가 agent 이벤트 룰 매칭 후 alert 마다 이 파일에 append.
[INPUT]
    Name              tail
    Path              /var/ossec/logs/alerts/alerts.json
    Tag               wazuh.alerts
    Parser            json
    Mem_Buf_Limit     16MB
    Refresh_Interval  2
    DB                /tmp/fluentbit_wazuh_alerts.db

# ── Wazuh archives (all raw events, high-volume — optional) ──────────
[INPUT]
    Name              tail
    Path              /var/ossec/logs/archives/archives.json
    Tag               wazuh.archives
    Parser            json
    Mem_Buf_Limit     32MB
    Refresh_Interval  5
    DB                /tmp/fluentbit_wazuh_archives.db

# 조직 식별자 + source 태그 부여.
[FILTER]
    Name    record_modifier
    Match   wazuh.*
    Record  source boanclaw-wazuh

# 구조화된 JSON 로그 파싱
[FILTER]
    Name         parser
    Match        boanclaw.*
    Key_Name     log
    Parser       json
    Reserve_Data On

# ── Kill Chain: Wazuh alert → /api/kill-chain/event 로 POST ──────────
# boan-proxy 가 /api/kill-chain/event 에서 process_name 매칭 + rule auto flag
# 에 따라 즉시 대응 또는 incident 기록. 필드 정규화는 서버 측에서 수행 —
# process_name 과 target_email 만 추출해서 POST body 에 담는다.
#
# Wazuh alert 의 rule.description 이나 data.win.eventdata.processName 같은
# 필드에서 process_name 을 뽑으려면 별도 파싱/매핑 필요. 현재 스텁:
# rule.description + data 를 그대로 보내고 proxy 가 process_name 필드를 찾음.
[OUTPUT]
    Name         http
    Match        wazuh.alerts
    Host         boan-sandbox
    Port         18081
    URI          /api/kill-chain/event
    Format       json
    json_date_key   timestamp
    header       Content-Type application/json

# stdout 출력 (디버깅)
[OUTPUT]
    Name         stdout
    Match        *
    Format       json_lines

# 파일 출력 (로컬 로그 보관)
[OUTPUT]
    Name         file
    Match        boanclaw.*
    Path         /var/log/boanclaw/
    File         traces.log

