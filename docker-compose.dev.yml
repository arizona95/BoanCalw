version: "3.9"

networks:
  boanclaw:
    driver: bridge

services:
  boan-guac-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=guacamole_db
      - POSTGRES_USER=guacamole_user
      - POSTGRES_PASSWORD=guacamole_pass
    volumes:
      - boan-guac-db:/var/lib/postgresql/data
      - ./deploy/guacamole-initdb-postgresql.sql:/docker-entrypoint-initdb.d/001-guacamole-initdb.sql:ro
    networks: [boanclaw]

  boan-guacd:
    image: guacamole/guacd:latest
    # boan-sandbox 의 boan-proxy 와 동일한 UID/GID 로 실행해서 같은 named
    # volume(boan-rdp-transfer) 의 파일을 양쪽 다 owner 자격으로 read/write
    # 할 수 있게 한다. guacd 가 RDP drive 채널로 받은 파일을 기본 mode 0600
    # 으로 쓰기 때문에 owner 가 다르면 S1→S2 전송이 EACCES 로 실패한다.
    # 같은 BOAN_UID/BOAN_GID 변수로 sandbox 의 build arg 와 동기화.
    # guacd 는 비특권 포트(4822) 만 바인드하므로 임의 UID 로 동작 가능.
    user: "${BOAN_UID:-1000}:${BOAN_GID:-1000}"
    # 임의 UID 는 guacd 이미지 /etc/passwd 에 없어서 HOME 이 "/" 로 fallback 되고,
    # 그 결과 FreeRDP 가 ~/.config/freerdp/ 에 TLS 인증서/상태를 못 써서 RDP NLA
    # 보안협상이 "Security negotiation failed (wrong security type?)" 로 실패한다.
    # /tmp 는 world-writable 이므로 HOME 을 옮기면 FreeRDP 가 /tmp/.config/freerdp/
    # 에 상태를 저장하고 TLS 핸드셰이크가 정상 동작한다.
    environment:
      - HOME=/tmp
    networks: [boanclaw]
    volumes:
      - boan-rdp-transfer:/data/rdp-transfer

  boan-guacamole:
    image: guacamole/guacamole:latest
    environment:
      - GUACD_HOSTNAME=boan-guacd
      - POSTGRESQL_HOSTNAME=boan-guac-db
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DATABASE=guacamole_db
      - POSTGRESQL_USER=guacamole_user
      - POSTGRESQL_PASSWORD=guacamole_pass
      - WEBAPP_CONTEXT=ROOT
    depends_on:
      - boan-guac-db
      - boan-guacd
    networks: [boanclaw]

  boan-policy-server:
    build:
      context: src/packages/boan-policy-server
    env_file:
      - deploy/config/gcp.env
    environment:
      - BOAN_LISTEN=:8081
      - BOAN_DATA_DIR=/data/policies
      - BOAN_KEY_DIR=/etc/boan-policy
      - BOAN_MOUNT_ROOT=/home/boan/Desktop/boanclaw
      # 가드레일 LLM은 LLM Registry의 Security binding 모델을 동적으로 사용
      # (proxy가 evaluate 요청 시 LLM URL/Model 전달)
    volumes:
      - boan-policy-data:/data/policies
      - boan-policy-keys:/etc/boan-policy
    ports:
      - "8081:8081"
    networks: [boanclaw]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  boan-credential-filter:
    build:
      context: src/packages/boan-credential-filter
    environment:
      - BOAN_LISTEN=:8082
      - BOAN_KMS_KEY=/etc/boan-cred/aes.key
    volumes:
      - boan-cred-keys:/etc/boan-cred
      - boan-cred-data:/data/credentials
    ports:
      - "8082:8082"
    networks: [boanclaw]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # boan-org-llm-proxy — 모든 외부 LLM upstream 호출의 단일 egress 포인트.
  # 로컬 호스트는 외부 LLM 으로 직접 나가지 않고 반드시 이 서비스를 경유한다.
  # 로컬 dev 에서는 같은 compose network 에서 뜨고, 프로덕션에서는 Cloud Run 으로
  # 분리 배포해서 실제 외부 egress 주체가 조직 서버가 된다.
  boan-org-llm-proxy:
    build:
      context: src/packages/boan-org-llm-proxy
    environment:
      - BOAN_LISTEN=:8091
      - BOAN_ORG_LLM_PROXY_AUTH_TOKEN=${BOAN_ORG_LLM_PROXY_AUTH_TOKEN:-boan-org-llm-proxy-local}
      - BOAN_ORG_LLM_PROXY_ALLOWED_HOSTS=${BOAN_ORG_LLM_PROXY_ALLOWED_HOSTS:-ollama.com,api.anthropic.com,api.openai.com,generativelanguage.googleapis.com,anthropic.com}
      - BOAN_ORG_LLM_PROXY_DENY_HOSTS=169.254.169.254,metadata.google.internal,localhost,127.0.0.1
    ports:
      - "8091:8091"
    networks: [boanclaw]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  boan-whitelist-proxy:
    profiles: ["legacy-host"]
    build:
      context: src/packages/boan-whitelist-proxy
    environment:
      - BOAN_LISTEN=:8085
    ports:
      - "8085:8085"
    networks: [boanclaw]

  boan-llm-registry:
    profiles: ["legacy-host"]
    build:
      context: src/packages/boan-llm-registry
    environment:
      - BOAN_LISTEN=:8086
      - BOAN_DATA_DIR=/data/registry
    volumes:
      - boan-registry-data:/data/registry
    ports:
      - "8086:8086"
    networks: [boanclaw]

  boan-asset-constitution:
    build:
      context: src/packages/boan-asset-constitution
    environment:
      - PORT=8087
    ports:
      - "8087:8087"
    networks: [boanclaw]

  boan-audit-agent:
    build:
      context: src/packages/boan-audit-agent
    environment:
      - BOAN_LISTEN=:8084
    ports:
      - "8084:8084"
    networks: [boanclaw]

  boan-proxy:
    profiles: ["legacy-host"]
    build:
      context: src/packages/boan-proxy
    env_file:
      - deploy/config/gcp.env
    environment:
      - TEST=true
      - BOAN_LISTEN=:18080
      - BOAN_ADMIN_LISTEN=:18081
      - BOAN_ADMIN_PASSWORD=boan-admin
      - BOAN_OAUTH_CLIENT_ID=${BOAN_OAUTH_CLIENT_ID:-}
      - BOAN_OAUTH_CLIENT_SECRET=${BOAN_OAUTH_CLIENT_SECRET:-}
      - BOAN_OAUTH_REDIRECT_URL=http://localhost:19080/api/auth/callback
      - BOAN_GCP_ORG_ID=${BOAN_GCP_ORG_ID:-}
      # 중앙 GCP 정책서버 — 소유자가 정책 변경 시 모든 배포에 자동 동기화
      - BOAN_POLICY_URL=https://boan-policy-server-sds-corp-3avhtf4kka-du.a.run.app
      - BOAN_ORG_TOKEN=${BOAN_ORG_TOKEN:-}
      - BOAN_CREDENTIAL_FILTER_URL=http://boan-credential-filter:8082
      - BOAN_LLM_REGISTRY_URL=http://boan-llm-registry:8086
      - BOAN_ORG_LLM_PROXY_URL=http://boan-org-llm-proxy:8091
      - BOAN_ORG_LLM_PROXY_AUTH_TOKEN=${BOAN_ORG_LLM_PROXY_AUTH_TOKEN:-boan-org-llm-proxy-local}
      - BOAN_ORG_LLM_PROXY_BYPASS_HOSTS=boan-grounding,localhost,127.0.0.1,boan-llm-registry,boan-credential-filter,boan-policy-server,boan-guacamole,boan-computer-use,boan-sandbox,boan-proxy,boan-audit-agent,boan-agent
      - BOAN_OTEL_ENDPOINT=http://boan-audit-agent:8084
      - BOAN_USER_DATA_DIR=/data/users
      - BOAN_MOUNT_ROOT=/home/boan/Desktop/boanclaw
      - BOAN_S1_STAGE_ROOT=/home/boan/Desktop/boanclaw-gcp
      - BOAN_GUACAMOLE_URL=http://boan-guacamole:8080
      - BOAN_GUACAMOLE_USERNAME=guacadmin
      - BOAN_GUACAMOLE_PASSWORD=guacadmin
      - BOAN_GUACAMOLE_BASE_PATH=/remote
      - BOAN_OPENCLAW_GATEWAY_TOKEN=boan-openclaw-local
      - GOOGLE_APPLICATION_CREDENTIALS=/var/run/gcp/service-account.json
    volumes:
      - boan-user-data:/data/users
      - ${BOAN_GCP_SERVICE_ACCOUNT_KEY_PATH:-${HOME}/.config/gcp/boanclaw-terraform-sa.json}:/var/run/gcp/service-account.json:ro
    ports:
      - "18080:18080"
      - "18081:18081"
    networks: [boanclaw]
    depends_on: [boan-policy-server, boan-credential-filter, boan-audit-agent, boan-guacamole, boan-llm-registry, boan-org-llm-proxy]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  boan-computer-use:
    build:
      context: src/packages/boan-computer-use
    ports:
      - "8090:8090"
    networks: [boanclaw]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 10s
      retries: 3

  boan-admin-console:
    build:
      context: src/packages/boan-admin-console
    ports:
      - "19080:80"
    networks: [boanclaw]
    depends_on: [boan-sandbox, boan-guacamole]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── boan-grounding ────────────────────────────────────────────────────────
  # GUI element grounding 전용 vLLM 서버. 자연어 ("the X close button on Notepad")
  # → 픽셀 좌표 (x, y) 변환만 담당. boan-proxy 의 computer-use agent 가 click 결정 시
  # http://boan-grounding:8000/v1/chat/completions 호출.
  #
  # 모델은 LLM Registry 에서 "grounding" 역할로 바인딩되어야 활성화됨.
  #
  # 사용 모델: osunlp/UGround-V1-2B (Qwen2-VL 베이스, BF16 ~4GB VRAM)
  #   • ScreenSpot-Pro 26.6% / ScreenSpot-v2 77.1% (Mobile-Text 94%, Desktop-Text 92%)
  #   • 현재 OS-Atlas-Base-7B (18.9%) 대비 40% 향상
  # 모델 교체: command 의 --model 만 바꾸고 컨테이너 재시작.
  # 호스트 nvidia driver 가 CUDA 12.9+ 지원하면 vllm/vllm-openai:latest + Tongyi-MAI/MAI-UI-2B
  #   (ScreenSpot-Pro 57.4%) 로 업그레이드 가능. 현재는 driver CUDA 12.4 라 v0.8.5.
  #
  # 요구사항: host 에 nvidia-container-toolkit (이미 됨).
  boan-grounding:
    image: vllm/vllm-openai:v0.8.5
    command:
      - "--model=osunlp/UGround-V1-2B"
      - "--served-model-name=grounding"
      - "--host=0.0.0.0"
      - "--port=8000"
      - "--dtype=bfloat16"
      - "--max-model-len=4096"
      - "--gpu-memory-utilization=0.85"
      - "--trust-remote-code"
      - "--enforce-eager"
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=1
    volumes:
      - boan-hf-cache:/root/.cache/huggingface
    networks: [boanclaw]
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 30   # 첫 모델 다운로드 시간 고려: 30 * 30s = 15분
      start_period: 60s
    restart: unless-stopped

  boan-sandbox:
    build:
      context: src/packages
      dockerfile: boan-sandbox/Dockerfile
      # boan UID/GID 를 host 사용자와 일치시켜서, sandbox 가 host bind mount
      # (~/Desktop/boanclaw 등) 에 만든 파일이 host 에서 본인 소유로 보이게 한다.
      # 기본 1000 은 일반 Linux 데스크탑 첫 사용자 UID. 다른 UID 를 쓰는 환경은
      # `BOAN_UID=$(id -u) BOAN_GID=$(id -g) docker compose build` 로 override.
      args:
        - BOAN_UID=${BOAN_UID:-1000}
        - BOAN_GID=${BOAN_GID:-1000}
    env_file:
      - deploy/config/gcp.env
    environment:
      - TEST=true
      - HTTP_PROXY=http://localhost:18080
      - HTTPS_PROXY=http://localhost:18080
      - NO_PROXY=localhost,127.0.0.1,boan-proxy,boan-policy-server,boan-guacamole,boan-audit-agent,boan-credential-filter,boan-llm-registry,boan-whitelist-proxy,boan-computer-use,boan-org-llm-proxy,boan-grounding,.run.app
      - no_proxy=localhost,127.0.0.1,boan-proxy,boan-policy-server,boan-guacamole,boan-audit-agent,boan-credential-filter,boan-llm-registry,boan-whitelist-proxy,boan-computer-use,boan-org-llm-proxy,boan-grounding,.run.app
      - BOAN_PROXY_ADMIN=http://localhost:18081
      - BOAN_SESSION_ID=dev-session-001
      - BOAN_ONECLI_CRED_FILTER_URL=http://boan-credential-filter:8082
      - BOAN_ONECLI_ORG_ID=sds-corp
      - BOAN_ONECLI_CREDENTIAL_NAME=anthropic-apikey-65a1f06a
      - BOAN_ONECLI_CREDENTIAL_TYPE=api_key
      # BOAN_ONECLI_UPSTREAM_URL 제거 — LLM Registry에서 동적 사용
      - BOAN_ORG_ID=sds-corp
      - BOAN_LISTEN=:18080
      - BOAN_ADMIN_LISTEN=:18081
      # 중앙 GCP 정책서버 — 소유자가 정책 변경 시 모든 배포에 자동 동기화
      - BOAN_POLICY_URL=https://boan-policy-server-sds-corp-3avhtf4kka-du.a.run.app
      - BOAN_ORG_TOKEN=${BOAN_ORG_TOKEN:-}
      - BOAN_AUDIT_ENDPOINT=http://boan-audit-agent:8084
      - BOAN_CREDENTIAL_FILTER_URL=http://boan-credential-filter:8082
      - BOAN_LLM_REGISTRY_URL=http://localhost:8086
      # 프로덕션 기본값: GCP Cloud Run org-llm-proxy. 로컬 개발용 컨테이너로 돌리고
      # 싶으면 host env 에서 BOAN_ORG_LLM_PROXY_URL=http://boan-org-llm-proxy:8091 로 override.
      - BOAN_ORG_LLM_PROXY_URL=${BOAN_ORG_LLM_PROXY_URL:-https://boan-org-llm-proxy-sds-corp-3avhtf4kka-du.a.run.app}
      - BOAN_ORG_LLM_PROXY_AUTH_TOKEN=${BOAN_ORG_LLM_PROXY_AUTH_TOKEN:-boan-org-llm-proxy-local}
      - BOAN_ORG_LLM_PROXY_BYPASS_HOSTS=boan-grounding,localhost,127.0.0.1,boan-llm-registry,boan-credential-filter,boan-policy-server,boan-guacamole,boan-computer-use,boan-sandbox,boan-proxy,boan-audit-agent,boan-agent
      - BOAN_USER_DATA_DIR=/data/users
      - BOAN_CREDENTIAL_DATA_DIR=/tmp/boan/credentials
      - BOAN_GUACAMOLE_URL=http://boan-guacamole:8080
      - BOAN_GUACAMOLE_USERNAME=guacadmin
      - BOAN_GUACAMOLE_PASSWORD=guacadmin
      - BOAN_GUACAMOLE_BASE_PATH=/remote
      - BOAN_DATA_DIR=/data/registry
      # 모든 정보레벨 경로는 바탕화면/boanclaw 기반으로 통일
      # S3(host PC): $HOME/Desktop/boanclaw (호스트마다 다름, compose resolve 해서 mount 소스로만 사용)
      # S2(sandbox): /home/boan/Desktop/boanclaw (고정)
      # S1(GCP Windows staging, sandbox-local): /home/boan/Desktop/boanclaw-gcp
      - BOAN_MOUNT_ROOT=/home/boan/Desktop/boanclaw
      - BOAN_S1_STAGE_ROOT=/home/boan/Desktop/boanclaw-gcp
      - BOAN_CA_CERT=/tmp/boan/ca.crt
      - BOAN_CA_KEY=/tmp/boan/ca.key
      - GOOGLE_APPLICATION_CREDENTIALS=/var/run/gcp/service-account.json
      - BOAN_OPENCLAW_GATEWAY_TOKEN=boan-openclaw-local
      - BOAN_RDP_TRANSFER_ROOT=/data/rdp-transfer
      - BOAN_VERSION_FILE=/app/.boanclaw-version
      - BOAN_LATEST_VERSION_FILE=/app/.boanclaw-latest
      - BOAN_UPDATE_TRIGGER_FILE=/app/triggers/update-requested
      # IP 바인딩은 GCP org-server 가 TOFU (Trust On First Use) 로 자동 관리.
      # 첫 로그인 시 client IP 를 자동 캡처 → 이후 해당 IP 에서만 로그인 허용.
      # 관리자가 리셋하려면: POST {policy-server}/org/{id}/v1/users/reset-ip
    ports:
      - "18789:18789"
    volumes:
      - ${BOAN_HOST_MOUNT_ROOT:-${HOME}/Desktop/boanclaw}:/home/boan/Desktop/boanclaw
      - ${BOAN_GCP_SERVICE_ACCOUNT_KEY_PATH:-${HOME}/.config/gcp/boanclaw-terraform-sa.json}:/var/run/gcp/service-account.json:ro
      - boan-user-data:/data/users
      - boan-registry-data:/data/registry
      - boan-rdp-transfer:/data/rdp-transfer
      # auto-update: version files (ro) + trigger file (rw)
      - ${BOAN_INSTALL_DIR:-.}/.boanclaw-version:/app/.boanclaw-version:ro
      - ${BOAN_INSTALL_DIR:-.}/.boanclaw-latest:/app/.boanclaw-latest:ro
      - /tmp/boanclaw-triggers:/app/triggers
    networks: [boanclaw]
    depends_on: [boan-policy-server, boan-audit-agent, boan-guacamole, boan-computer-use, boan-credential-filter, boan-org-llm-proxy]

volumes:
  boan-guac-db:
  boan-policy-data:
  boan-policy-keys:
  boan-cred-keys:
  boan-cred-data:
  boan-registry-data:
  boan-user-data:
  boan-rdp-transfer:
  boan-hf-cache:    # vLLM 의 HuggingFace 모델 캐시 (재시작 시 재다운로드 회피)
