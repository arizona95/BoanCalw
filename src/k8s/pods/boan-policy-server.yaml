apiVersion: apps/v1
kind: Deployment
metadata:
  name: boan-policy-server
  namespace: boan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boan-policy-server
  template:
    metadata:
      labels:
        app: boan-policy-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: boan-policy-server
          image: boanclaw/boan-policy-server:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          env:
            - name: BOAN_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: boan-org-config
                  key: org_id
          volumeMounts:
            - name: policy-data
              mountPath: /data/policies
            - name: policy-keys
              mountPath: /etc/boan-policy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
      volumes:
        - name: policy-data
          persistentVolumeClaim:
            claimName: boan-policy-data
        - name: policy-keys
          secret:
            secretName: boan-policy-keys
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: boan-policy-server
  namespace: boan
spec:
  selector:
    app: boan-policy-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
