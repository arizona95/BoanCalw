# Ref: NemoClaw nemoclaw-blueprint/orchestrator + openclaw-multitenant blast-radius
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boan-proxy
  namespace: boan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boan-proxy
  template:
    metadata:
      labels:
        app: boan-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: boan-proxy
          image: boanclaw/boan-proxy:latest
          ports:
            - containerPort: 18080
            - containerPort: 18081
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: BOAN_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: boan-org-config
                  key: org_id
            - name: BOAN_POLICY_URL
              valueFrom:
                secretKeyRef:
                  name: boan-org-config
                  key: policy_url
            - name: BOAN_AUDIT_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: boan-org-config
                  key: audit_endpoint
            - name: BOAN_CLIENT_CERT
              value: /etc/boan-mtls/tls.crt
            - name: BOAN_CLIENT_KEY
              value: /etc/boan-mtls/tls.key
            - name: BOAN_SERVER_CA
              value: /etc/boan-mtls/ca.crt
          volumeMounts:
            - name: boan-ca
              mountPath: /etc/boan
              readOnly: true
            - name: boan-mtls-certs
              mountPath: /etc/boan-mtls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18081
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18081
            periodSeconds: 30
      volumes:
        - name: boan-ca
          secret:
            secretName: boan-ca
            defaultMode: 0400
        - name: boan-mtls-certs
          secret:
            secretName: boan-mtls-certs
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: boan-proxy
  namespace: boan
spec:
  selector:
    app: boan-proxy
  ports:
    - name: proxy
      port: 18080
      targetPort: 18080
    - name: admin
      port: 18081
      targetPort: 18081
