apiVersion: apps/v1
kind: Deployment
metadata:
  name: boan-admin-console
  namespace: boan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boan-admin-console
  template:
    metadata:
      labels:
        app: boan-admin-console
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: boan-admin-console
          image: boanclaw/boan-admin-console:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
            requests:
              memory: "32Mi"
              cpu: "25m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: boan-admin-console
  namespace: boan
spec:
  selector:
    app: boan-admin-console
  ports:
    - name: http
      port: 80
      targetPort: 80
