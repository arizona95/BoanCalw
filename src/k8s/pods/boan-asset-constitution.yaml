apiVersion: apps/v1
kind: Deployment
metadata:
  name: boan-asset-constitution
  namespace: boan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boan-asset-constitution
  template:
    metadata:
      labels:
        app: boan-asset-constitution
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: boan-asset-constitution
          image: boanclaw/boan-asset-constitution:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          env:
            - name: BOAN_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: boan-org-config
                  key: org_id
            - name: BOAN_POLICY_URL
              value: "http://boan-policy-server:8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: boan-asset-constitution
  namespace: boan
spec:
  selector:
    app: boan-asset-constitution
  ports:
    - name: http
      port: 8080
      targetPort: 8080
